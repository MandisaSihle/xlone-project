{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Post • X Clone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<!-- X HEADER -->
<div class="header">
    <img src="{% static 'images/x_logo.png' %}" alt="X Logo" class="x-logo">
</div>

<div class="container">

    <h2>Edit Post</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Name -->
        <input type="text"
               name="name"
               value="{{ form.instance.name }}"
               required>

        <!-- Body -->
        <textarea name="body"
                  required>{{ form.instance.body }}</textarea>

        <!-- Current Image Preview -->
        {% if form.instance.image %}
            <p>Current image:</p>
            <img src="{{ form.instance.image.url }}" class="post-image">
        {% endif %}

        <!-- Replace Image -->
        <label>Replace image</label>
        <input type="file" name="image" accept="image/*">

        <div style="margin-top: 12px;">
            <button type="submit">Update</button>
            <a href="{% url 'post1' %}" style="margin-left: 12px;">Cancel</a>
        </div>
    </form>

</div>

</body>
</html>
